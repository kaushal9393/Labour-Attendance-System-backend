name: garage_attendance
description: Garage Attendance System — Kiosk & Admin modes
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image: ^4.1.7

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.2.3

  # Camera
  camera: ^0.10.5+9

  # Firebase
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1

  # UI helpers
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  table_calendar: ^3.1.1

  # Local notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Utils
  permission_handler: ^11.3.0
  local_auth: ^2.2.0

  # PDF report
  pdf: ^3.10.7
  printing: ^5.12.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
